name: Publish new build
run-name: "Publish new images for ${{ github.ref_name }} triggered by ${{ github.actor }}; version: ${{ inputs.version || 'N/A'}}"

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - v2
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version number"
        required: true
      deploy-to-production:
        description: "Deploy the new version on production?"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  code-check:
    uses: ./.github/workflows/code-check.yml

  bump-version:
    runs-on: ubuntu-latest
    if: ${{ (github.ref_name == 'main' || github.ref_name == 'v2') && inputs.version != '' }}
    needs:
      - code-check
    outputs:
      commit_sha: ${{ steps.commit-version.outputs.commit_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install semver
        run: npm install semver

      - name: Get current version
        run: echo "current_version=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Validate and set new version
        run: |
          new_version="${{ inputs.version }}"
          current_version="${{ env.current_version }}"
          release_branch="${{ github.ref_name }}"

          case "$release_branch" in
            main) expected_major="1" ;;
            v2) expected_major="2" ;;
            *)
              echo "Error: Releases are supported only from main and v2 branches"
              exit 1
              ;;
          esac

          if ! npx semver "$new_version" > /dev/null; then
            echo "Error: Invalid semantic version: $new_version"
            exit 1
          fi

          if ! npx semver "$new_version" -r "${expected_major}.x" > /dev/null; then
            echo "Error: Branch $release_branch accepts only ${expected_major}.x versions"
            exit 1
          fi

          if npx semver "$new_version" -r "<=$current_version" > /dev/null; then
            echo "Error: New version ($new_version) must be greater than current version ($current_version)"
            exit 1
          fi

      - name: Bump version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Commit version change
        id: commit-version
        run: |
          git commit -am "Update version to ${{ inputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build-and-publish:
    needs:
      - code-check
      - bump-version
    if: |
      always() &&
      (inputs.version == '' || github.ref_name == 'main' || github.ref_name == 'v2') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/build-docker-image.yml
    with:
      version: ${{ inputs.version }}
      commit_sha: ${{ inputs.version != '' && needs.bump-version.outputs.commit_sha || '' }}
      ecr_repository: ${{ (github.ref_name == 'v2' || github.base_ref == 'v2') && 'filecoin-oracle-service-v2' || 'filecoin-oracle-service' }}
    secrets: inherit

  git-tag:
    runs-on: ubuntu-latest
    needs:
      - bump-version
      - build-and-publish
    if: |
      always() &&
      inputs.version != '' &&
      (github.ref_name == 'main' || github.ref_name == 'v2') &&
      needs.bump-version.result == 'success' &&
      needs.build-and-publish.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.commit_sha }}

      - name: Create and push tag
        run: |
          TAG_NAME="v${{ inputs.version }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

  trigger-production-deploy:
    runs-on: ubuntu-latest
    needs:
      - code-check
      - build-and-publish
    if: ${{ inputs.version != '' && inputs.deploy-to-production == true && (github.ref_name == 'main' || github.ref_name == 'v2') }}
    environment: production-fidl
    steps:
      - name: Trigger production deploy
        uses: neti-filplus-infra/filplus-deploy-action@main
        with:
          version: ${{ inputs.version }}
          environment: production
          ecr-repository: ${{ github.ref_name == 'v2' && 'filecoin-oracle-service-v2' || 'filecoin-oracle-service' }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_IMAGE_DEPLOYER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_IMAGE_DEPLOYER }}
          aws-region: us-east-1
